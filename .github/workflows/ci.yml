name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: js/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:ext     # web-ext lint (store/AMO compliance)
      - run: npm run test:unit
      - run: npm run test:smoke   # hits zippopotam.us (geocoding); network-dependent
